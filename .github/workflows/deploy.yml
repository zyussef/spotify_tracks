name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from Actions tab

permissions:
  contents: read
  pages:    write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Patch docs/index.html: replace placeholder with real repo info
      - name: Inject GitHub repo URL into index.html
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          sed -i \
            "s|YOUR_GITHUB_USERNAME|${OWNER}|g; s|YOUR_REPO_NAME|${REPO}|g" \
            docs/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/   # only the docs/ folder is served

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
