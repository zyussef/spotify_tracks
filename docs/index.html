<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Analysis</title>

  <!-- stlite: Streamlit running entirely in the browser via WebAssembly -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.0/build/stlite.css"
  />

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #191414; }
    #root { height: 100vh; }

    #splash {
      position: fixed; inset: 0;
      background: #191414;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      font-family: sans-serif;
      transition: opacity 0.6s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash h1  { color: #1DB954; font-size: 2rem; margin: 0 0 6px; }
    #splash p   { color: #888;    font-size: 0.9rem; margin: 0 0 24px; }
    #splash small { color: #444; margin-top: 16px; font-size: 0.75rem; }
    #splash-step  { color: #555; font-size: 0.8rem; margin-top: 8px; }

    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #333;
      border-top-color: #1DB954;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-box {
      display: none;
      border: 2px solid #FF6B9D;
      border-radius: 12px;
      padding: 20px 32px;
      margin-top: 24px;
      text-align: center;
      max-width: 480px;
    }
    #error-box h2 { color: #FF6B9D; margin: 0 0 8px; }
    #error-box p  { color: #aaa; font-size: 0.85rem; margin: 0; }
  </style>
</head>

<body>
  <div id="splash">
    <h1>🎵 Spotify Analysis</h1>
    <p>Loading Python runtime — first visit takes ~20 seconds…</p>
    <div class="spinner"></div>
    <div id="splash-step">Fetching app…</div>
    <small>Powered by stlite · Streamlit in WebAssembly</small>
    <div id="error-box">
      <h2>Load Error</h2>
      <p id="error-msg">Something went wrong.</p>
    </div>
  </div>

  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.0/build/stlite.js"></script>

  <script>
    const GITHUB_RAW = "https://raw.githubusercontent.com/zyussef/spotify_tracks/main/";
    const splash     = document.getElementById("splash");
    const stepEl     = document.getElementById("splash-step");

    function showError(msg) {
      document.getElementById("error-box").style.display = "block";
      document.getElementById("error-msg").textContent   = msg;
      document.querySelector(".spinner").style.display   = "none";
    }

    // Dismiss splash once Streamlit renders its first element
    const observer = new MutationObserver(() => {
      if (document.querySelector(".stApp")) {
        splash.classList.add("hidden");
        setTimeout(() => splash.remove(), 700);
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById("root"), { childList: true, subtree: true });

    // 1. Fetch app.py as text, then mount stlite
    //    (more reliable than stlite's {url:} file syntax)
    stepEl.textContent = "Fetching app.py…";
    fetch(GITHUB_RAW + "app.py")
      .then(r => {
        if (!r.ok) throw new Error(`app.py fetch failed (HTTP ${r.status})`);
        stepEl.textContent = "Starting Python runtime…";
        return r.text();
      })
      .then(appCode => {
        stlite.mount(
          {
            requirements: ["pandas", "plotly", "scikit-learn", "numpy"],
            entrypoint: "app.py",
            files: {
              // Inline app.py content — no URL dependency at mount time
              "app.py": appCode,
              // CSV is too large to inline; app.py's load_data() fetches it
              // from GITHUB_RAW via pd.read_csv(url) in its except branch
            },
          },
          document.getElementById("root")
        );
      })
      .catch(err => showError(err.message));
  </script>
</body>
</html>
